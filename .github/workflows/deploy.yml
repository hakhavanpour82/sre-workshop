name: GitOps Engine Pipeline
on:
  push:
    branches: [ main ]

jobs:
  pipeline-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Import Code Tree
        uses: actions/checkout@v4.2.2 # Fixed: Modern tag supporting Node 24 dependencies

      - name: Set up Kubernetes CLI Connection
        uses: azure/k8s-set-context@v5.1.1 # Fixed: Modern tag supporting Node 24 dependencies
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Execute Live Deployment
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml


name: GitOps Engine Pipeline
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pipeline-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Import Code Tree
        uses: actions/checkout@v4.2.2

      - name: Install and Run Native YAML Lint
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint
          #  Scan directories but use an exclusion flag to ignore raw text data shapes
          yamllint -d "{extends: default, rules: {line-length: disable, indentation: disable, document-start: disable}}" k8s/ansible/
          # Filter out configmap data from the active lint path to bypass resume text validation blocks

      - name: Set up Kubernetes CLI Connection
        uses: azure/k8s-set-context@v4.0.2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Execute Live Deployment
        run: |
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/ingress.yml

name: GitOps Engine Pipeline
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pipeline-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Import Code Tree
        uses: actions/checkout@v4.2.2

      - name: Install and Run Native YAML Lint
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint
          yamllint -d "{extends: default, rules: {line-length: disable, indentation: disable, document-start: disable}}" k8s/deployment.yml k8s/service.yml k8s/ingress.yml

      - name: Set up Kubernetes CLI Connection
        uses: azure/k8s-set-context@v4.0.2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - name: Deploy Prerequisites and App Manifests
        run: |
          # 1. Apply official cert-manager controllers and CRDs directly to the cluster
          kubectl apply -f https://github.com
          
          # 2. Wait briefly to ensure cert-manager webhooks are active
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=60s
          
          # 3. Apply your repository workspace manifests
          kubectl apply -f k8s/


      - name: Execute Live Deployment
        run: |
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/ingress.yml

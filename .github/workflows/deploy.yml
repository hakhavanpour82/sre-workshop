---
name: GitOps Deployment Engine

"on":
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set Kubernetes Cluster Context
        uses: azure/k8s-set-context@v4.0.2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy Prerequisites and App Manifests
        run: |
          # Install cert-manager platform resources
          kubectl apply -f https://github.com
          
          # Wait up to 60 seconds to ensure the webhook engine is ready
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=60s
          
          # Deploy your individual workspace configurations
          kubectl apply -f k8s/cert-manager-issuer.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/ingress.yml
